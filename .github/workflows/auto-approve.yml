name: Auto-approve

# For PRs you open yourself, github-actions[bot] (a) turns on auto-merge and
# (b) approves them, satisfying the 1-approval rule on main — so they squash-merge
# as soon as CI is green, with no manual step. Collaborators are unaffected: the
# bot only acts on PRs authored by the repo owner (nmrtist).
#
# Escape hatch: open a PR as a DRAFT for anything not ready to ship. Drafts are
# skipped here and cannot auto-merge. Mark it "Ready for review" to release it.
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  ship:
    name: Approve & enable auto-merge
    # Only the owner's non-draft PRs. The bot is a distinct identity from the
    # author, so it is allowed to approve (you cannot approve your own PR).
    if: >-
      github.event.pull_request.user.login == 'nmrtist' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_URL: ${{ github.event.pull_request.html_url }}
    steps:
      - name: Approve as github-actions[bot]
        # dismiss_stale_reviews_on_push drops this approval on every push; the
        # `synchronize` trigger re-runs the job to re-approve the new head.
        run: gh pr review --approve "$PR_URL"
      - name: Enable auto-merge (squash)
        # Idempotent: re-running when already enabled is a no-op.
        run: gh pr merge --auto --squash "$PR_URL"
